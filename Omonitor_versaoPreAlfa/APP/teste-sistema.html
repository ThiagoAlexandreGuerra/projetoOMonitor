<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Sistema</title>
    <style>
        body { background: black; color: white; font-family: monospace; padding: 20px; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>Teste de Carregamento</h1>
    <div id="logs"></div>

    <script type="module">
        const logs = document.getElementById('logs');
        
        function log(msg, isError = false) {
            const div = document.createElement('div');
            div.textContent = msg;
            div.style.color = isError ? 'red' : 'lime';
            logs.appendChild(div);
            console.log(msg);
        }

        try {
            log('🟡 Testando import do DivParaNavegacao...');
            const module = await import('./src/javascript/utils/DivParaNavegacao.js');
            log('✅ DivParaNavegacao carregado com sucesso!');
            
            const DivParaNavegacao = module.default;
            const nav = new DivParaNavegacao();
            log('✅ Instância criada! Classe: ' + nav.getClassList);
            
        } catch (error) {
            log('❌ ERRO: ' + error.message, true);
            log('❌ Stack: ' + error.stack, true);
        }
    </script>
</body>
</html>
