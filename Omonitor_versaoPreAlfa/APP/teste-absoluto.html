<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste com Caminho Absoluto</title>
    <style>
        body { background: black; color: white; font-family: monospace; padding: 20px; }
        .success { color: #00ff00; }
        .error { color: #ff0000; }
    </style>
</head>
<body>
    <h1>Teste com Caminho Absoluto</h1>
    <div id="logs"></div>

    <script type="module">
        const logs = document.getElementById('logs');
        
        function log(msg, isError = false) {
            const div = document.createElement('div');
            div.textContent = msg;
            div.style.color = isError ? 'red' : 'lime';
            logs.appendChild(div);
            console.log(msg);
        }

        // IMPORTANTE: Substitua este caminho pelo que apareceu no seu pwd
        const basePath = 'C:/Users/User/Desktop/UFJF/projetoOMonitor-main/Omonitor_versaoPreAlfa/APP';
        
        log('🟡 Caminho base: ' + basePath);
        
        // Tentar importar de diferentes formas
        const caminhosTeste = [
            './src/javascript/utils/DivParaNavegacao.js',
            '/src/javascript/utils/DivParaNavegacao.js',
            'src/javascript/utils/DivParaNavegacao.js'
        ];
        
        for (const caminho of caminhosTeste) {
            try {
                log(`🟡 Tentando: ${caminho}`);
                const module = await import(caminho);
                log(`✅ Sucesso com: ${caminho}`, false);
                break;
            } catch (e) {
                log(`❌ Falhou: ${caminho} - ${e.message}`, true);
            }
        }
    </script>
</body>
</html>
